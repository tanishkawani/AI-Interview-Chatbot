<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
</head>
<body>

<h1>Interview Chatbot</h1>

<p id="question">Loading question...</p>

<input type="text" id="answer" placeholder="Type your answer">
<button onclick="submitAnswer()">Submit</button>

<p id="feedback"></p>

<br>
<button onclick="nextQuestion()">Next Question</button>
<button onclick="goBack()">Back to Dashboard</button>

<script>
let questions = [
  "Tell me about yourself",
  "What are your strengths?",
  "Explain OSI model",
  "What is HTML?",
  "Why should we hire you?"
];

function loadQuestion(){
  let random = Math.floor(Math.random() * questions.length);
  document.getElementById("question").innerText = questions[random];
}

function submitAnswer(){
  let ans = document.getElementById("answer").value;

  if(ans.length > 20){
    document.getElementById("feedback").innerText = "Good answer 👍";
  } else {
    document.getElementById("feedback").innerText = "Try to explain more ⚠️";
  }
}

function nextQuestion(){
  loadQuestion();
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerText = "";
}

function goBack(){
  window.location.href = "dashboard.html";
}

loadQuestion();
</script>

</body>
</html>
