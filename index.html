<!DOCTYPE html>
<html>
<head>
  <title>AI Interview Chatbot</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #e6f2ff;
      margin: 0;
    }

    .screen {
      display: none;
      margin-top: 120px;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      background: white;
      color: #007bff;
      border: 2px solid #007bff;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:active {
      background: #007bff;
      color: white;
    }

    #chatBox {
      width: 80%;
      margin: auto;
      background: white;
      padding: 20px;
      height: 300px;
      overflow-y: auto;
      border-radius: 10px;
    }

    .bot {
      text-align: left;
      margin: 10px;
    }

    .user {
      text-align: right;
      margin: 10px;
    }

    .topbar {
      position: absolute;
      top: 10px;
      right: 20px;
    }

    .menu {
      display: none;
      position: absolute;
      right: 0;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      width: 150px;
    }

    .menu div {
      padding: 8px;
      cursor: pointer;
    }

    .menu div:hover {
      background: #e6f2ff;
    }
  </style>
</head>

<body>

<!-- 🔷 TOP MENU -->
<div class="topbar">
  <button onclick="toggleMenu()">🏠</button>

  <div id="menu" class="menu">
    <div>🔔 Notifications</div>
    <div>📜 History</div>
    <div>📊 Track Score</div>
  </div>
</div>

<!-- 🔷 START -->
<div id="start" class="screen" style="display:block;">
  <h1>🤖 AI Interview Chatbot</h1>
  <button onclick="showDomain()">Start Test</button>
</div>

<!-- 🔷 DOMAIN -->
<div id="domain" class="screen">
  <h2>Select Domain</h2>
  <button onclick="selectDomain('HR')">HR</button>
  <button onclick="selectDomain('Technical')">Technical</button>
</div>

<!-- 🔷 LEVEL -->
<div id="level" class="screen">
  <h2>Select Level</h2>
  <button onclick="startChat('Easy')">Easy</button>
  <button onclick="startChat('Medium')">Medium</button>
  <button onclick="startChat('Hard')">Hard</button>
</div>

<!-- 🔷 CHAT -->
<div id="chat" class="screen">
  <h2>Interview Preparation and Feedback</h2>

  <div id="chatBox"></div>

  <input type="text" id="answer" placeholder="Type your answer">
  <br>

  <button onclick="send()">Send</button>
  <button onclick="showScore()">End Test</button>
</div>

<script>
let domain = "";
let level = "";

let score = 0;
let total = 0;

let questionBank = {
  HR: {
    Easy: [
      "Tell me about yourself",
      "What are your strengths?"
    ],
    Medium: [
      "Why should we hire you?",
      "Describe a challenge you faced"
    ],
    Hard: [
      "Where do you see yourself in 5 years?",
      "How do you handle failure?"
    ]
  },

  Technical: {
    Easy: [
      "What is HTML?",
      "What is CSS?"
    ],
    Medium: [
      "Explain OSI model",
      "What is DBMS?"
    ],
    Hard: [
      "Explain normalization",
      "What is multithreading?"
    ]
  }
};

function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function showDomain(){
  document.getElementById("start").style.display = "none";
  document.getElementById("domain").style.display = "block";
}

function selectDomain(d){
  domain = d;
  document.getElementById("domain").style.display = "none";
  document.getElementById("level").style.display = "block";
}

function startChat(l){
  level = l;
  score = 0;
  total = 0;

  document.getElementById("level").style.display = "none";
  document.getElementById("chat").style.display = "block";

  askQuestion();
}

function askQuestion(){
  let list = questionBank[domain][level];
  let q = list[Math.floor(Math.random()*list.length)];

  let chatBox = document.getElementById("chatBox");
  chatBox.innerHTML += `<div class='bot'>🤖 ${q}</div>`;
}

function send(){
  let ans = document.getElementById("answer").value;
  let chatBox = document.getElementById("chatBox");

  chatBox.innerHTML += `<div class='user'>🙋 ${ans}</div>`;

  total++;

  if(ans.length > 20){
    chatBox.innerHTML += `<div class='bot'>👍 Good answer</div>`;
    score++;
  } else {
    chatBox.innerHTML += `<div class='bot'>⚠️ Try to explain more</div>`;
  }

  document.getElementById("answer").value = "";

  askQuestion();
}

function showScore(){
  alert("Your Score: " + score + " / " + total);
}
</script>

</body>
</html>
