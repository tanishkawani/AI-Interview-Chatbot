<!DOCTYPE html>
<html>
<head>
  <title>AI Interview Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .screen {
      display: none;
      padding: 30px;
    }

    .active {
      display: block;
    }

    h1, h2 {
      margin-top: 20px;
    }

    /* BUTTON STYLE */
    .btn {
      padding: 12px 25px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      font-weight: bold;
    }

    .btn:active {
      background: #1d3557;
    }

    /* LEVEL & DOMAIN SAME STYLE */
    .levels button {
      margin: 10px;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: -250px;
      top: 0;
      width: 250px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.3s;
      text-align: left;
    }

    .sidebar.active {
      left: 0;
    }

    .menu-item {
      margin: 20px 0;
      cursor: pointer;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
    }

    .icon {
      cursor: pointer;
      font-size: 20px;
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
    }

  </style>
</head>

<body>

<!-- 🔷 SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>Welcome User</h3>
  <div class="menu-item">📊 Dashboard</div>
  <div class="menu-item">🕒 Interview History</div>
  <div class="menu-item">🔑 Login</div>
  <div class="menu-item">➕ Sign Up</div>
</div>

<!-- 🔷 SCREEN 1 -->
<div id="screen1" class="screen active">

  <div class="topbar">
    <span class="icon" onclick="toggleSidebar()">☰</span>

    <span><b>AI Interview Chatbot</b></span>

    <div class="auth-buttons">
      <button class="btn">Login</button>
      <button class="btn">Sign Up</button>
    </div>
  </div>

  <h2>Hello! How can I assist you today?</h2>

  <button class="btn" onclick="goToScreen2()">Start Mock Interview</button>
</div>

<!-- 🔷 SCREEN 2 -->
<div id="screen2" class="screen">

  <div class="topbar">
    <span class="icon" onclick="goBack()">⬅</span>
    <span>AI Interview Chatbot</span>
  </div>

  <h2>Select Your Domain & Level</h2>

  <h3>Choose Domain</h3>
  <div class="levels">
    <button class="btn" onclick="selectDomain('Software')">💻 Software</button>
    <button class="btn" onclick="selectDomain('HR')">👤 HR</button>
    <button class="btn" onclick="selectDomain('Aptitude')">🧠 Aptitude</button>
  </div>

  <h3>Select Level</h3>
  <div class="levels">
    <button class="btn" onclick="selectLevel('Easy')">Easy</button>
    <button class="btn" onclick="selectLevel('Medium')">Intermediate</button>
    <button class="btn" onclick="selectLevel('Hard')">Advanced</button>
  </div>

  <button class="btn" onclick="startInterview()">Begin Interview</button>
</div>

<!-- 🔷 SCREEN 3 -->
<div id="screen3" class="screen">

  <div class="topbar">
    <span class="icon" onclick="goBack2()">⬅</span>
    <span>AI Interview Chatbot</span>
    <span class="icon" onclick="toggleSidebar()">☰</span>
  </div>

  <h2>Interview Started</h2>
  <p id="question">Question will appear here</p>

  <input type="text" id="answer" placeholder="Type your answer..." style="padding:10px; width:60%;">
  <br>

  <button class="btn" onclick="submitAnswer()">Submit</button>
</div>

<script>
let domain = "";
let level = "";

let questions = {
  HR: ["Tell me about yourself", "Why should we hire you?"],
  Software: ["What is HTML?", "Explain OOP"],
  Aptitude: ["What is 20% of 200?", "Next number: 2,4,8,?"]
};

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

function goToScreen2(){
  document.getElementById("screen1").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

function goBack(){
  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen1").classList.add("active");
}

function goBack2(){
  document.getElementById("screen3").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

function selectDomain(d){
  domain = d;
  alert("Selected: " + d);
}

function selectLevel(l){
  level = l;
  alert("Level: " + l);
}

function startInterview(){
  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen3").classList.add("active");
  nextQuestion();
}

function nextQuestion(){
  let q = questions[domain][Math.floor(Math.random()*questions[domain].length)];
  document.getElementById("question").innerText = q;
}

function submitAnswer(){
  let ans = document.getElementById("answer").value;

  if(ans.length > 10){
    alert("Good Answer 👍");
  } else {
    alert("Try to improve ⚠️");
  }

  document.getElementById("answer").value = "";
  nextQuestion();
}
</script>

</body>
</html>
