<!DOCTYPE html>
<html>
<head>
  <title>AI Interview Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .screen {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .icon {
      cursor: pointer;
      font-size: 20px;
      width: 40px;
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
    }

    /* BUTTON STYLE */
    .btn {
      padding: 12px 25px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      font-weight: bold;
    }

    .btn.selected {
      background: #1d3557;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: -250px;
      top: 0;
      width: 250px;
      height: 100%;
      background: #111;
      padding: 20px;
      transition: 0.3s;
      text-align: left;
    }

    .sidebar.active {
      left: 0;
    }

    .menu-item {
      margin: 20px 0;
      cursor: pointer;
    }

    /* QUESTION + ANSWER LAYOUT */
    .qa-container {
      display: flex;
      height: 60vh;
      gap: 20px;
      margin-top: 20px;
    }

    .box {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
    }

    .question-box {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    .answer-box textarea {
      width: 100%;
      height: 80%;
      border-radius: 10px;
      border: none;
      padding: 15px;
      font-size: 16px;
      resize: none;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>Welcome User</h3>
  <div class="menu-item">📊 Dashboard</div>
  <div class="menu-item">🕒 Interview History</div>
  <div class="menu-item">🔑 Login</div>
  <div class="menu-item">➕ Sign Up</div>
</div>

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">

  <div class="topbar">
    <span class="icon" onclick="toggleSidebar()">☰</span>

    <div class="title">AI INTERVIEW CHATBOT</div>

    <div class="auth-buttons">
      <button class="btn">Login</button>
      <button class="btn">Sign Up</button>
    </div>
  </div>

  <h2>Hello! How can I assist you today?</h2>
  <button class="btn" onclick="goToScreen2()">Start Mock Interview</button>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">

  <div class="topbar">
    <span class="icon" onclick="toggleSidebar()">☰</span>
    <div class="title">AI INTERVIEW CHATBOT</div>
    <span class="icon" onclick="goBack()">⬅</span>
  </div>

  <h2>Select Your Domain & Level</h2>

  <h3>Choose Domain</h3>
  <div>
    <button class="btn" onclick="selectDomain(this,'Software')">💻 Software</button>
    <button class="btn" onclick="selectDomain(this,'HR')">👤 HR</button>
    <button class="btn" onclick="selectDomain(this,'Aptitude')">🧠 Aptitude</button>
  </div>

  <h3>Select Level</h3>
  <div>
    <button class="btn" onclick="selectLevel(this,'Easy')">Easy</button>
    <button class="btn" onclick="selectLevel(this,'Medium')">Intermediate</button>
    <button class="btn" onclick="selectLevel(this,'Hard')">Advanced</button>
  </div>

  <button class="btn" onclick="startInterview()">Begin Interview</button>
</div>

<!-- SCREEN 3 -->
<div id="screen3" class="screen">

  <div class="topbar">
    <span class="icon" onclick="toggleSidebar()">☰</span>
    <div class="title">AI INTERVIEW CHATBOT</div>
    <span class="icon" onclick="goBack2()">⬅</span>
  </div>

  <h2>Interview Started</h2>

  <div class="qa-container">
    
    <div class="box question-box" id="question">
      Question will appear here
    </div>

    <div class="box answer-box">
      <textarea id="answer" placeholder="Type your answer here..."></textarea>
      <br><br>
      <button class="btn" onclick="submitAnswer()">Submit</button>
    </div>

  </div>

</div>

<script>
let domain = "";
let level = "";

/* QUESTIONS */
let questions = {
  HR: ["Tell me about yourself", "Why should we hire you?"],
  Software: ["What is HTML?", "Explain OOP"],
  Aptitude: ["What is 20% of 200?", "Next number: 2,4,8,?"]
};

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

/* NAVIGATION */
function goToScreen2(){
  document.getElementById("screen1").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

function goBack(){
  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen1").classList.add("active");
}

function goBack2(){
  document.getElementById("screen3").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

/* SELECT BUTTON COLOR CHANGE */
function selectDomain(btn,d){
  domain = d;

  document.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

function selectLevel(btn,l){
  level = l;

  document.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

/* START */
function startInterview(){
  if(domain === "" || level === ""){
    alert("Please select domain and level");
    return;
  }

  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen3").classList.add("active");
  nextQuestion();
}

/* QUESTIONS */
function nextQuestion(){
  let q = questions[domain][Math.floor(Math.random()*questions[domain].length)];
  document.getElementById("question").innerText = q;
}

/* SUBMIT */
function submitAnswer(){
  let ans = document.getElementById("answer").value;

  if(ans.length > 10){
    alert("Good Answer 👍");
  } else {
    alert("Try to improve ⚠️");
  }

  document.getElementById("answer").value = "";
  nextQuestion();
}
</script>

</body>
</html>
