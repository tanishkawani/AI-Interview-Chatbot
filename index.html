<!DOCTYPE html>
<html>
<head>
  <title>AI Interview App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e6f2ff;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: flex-end;
      padding: 10px 20px;
      background: #cce6ff;
    }

    .icon {
      margin-left: 15px;
      cursor: pointer;
      font-size: 20px;
    }

    /* MAIN LAYOUT */
    .container {
      display: flex;
      height: 85vh;
      padding: 20px;
      gap: 20px;
    }

    .box {
      width: 50%;
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    /* ANSWER INPUT */
    textarea {
      width: 100%;
      height: 60%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    /* BUTTONS */
    .buttons {
      text-align: center;
      margin-top: 15px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: white;
      color: #007bff;
      border: 2px solid #007bff;
      border-radius: 8px;
      cursor: pointer;
    }

    button:active {
      background: #007bff;
      color: white;
    }

    /* POPUPS */
    .popup {
      display: none;
      position: fixed;
      top: 70px;
      right: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0px 5px 10px rgba(0,0,0,0.2);
      width: 250px;
    }

    input {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }
  </style>
</head>

<body>

<!-- 🔷 TOP BAR -->
<div class="topbar">
  <div class="icon" onclick="toggleProfile()">👤</div>
  <div class="icon" onclick="showNotification()">🔔</div>
  <div class="icon" onclick="showScore()">📊</div>
</div>

<!-- 🔷 MAIN CONTENT -->
<div class="container">

  <!-- QUESTION BOX -->
  <div class="box">
    <h2>Question</h2>
    <p id="question">Click Start to begin</p>
  </div>

  <!-- ANSWER BOX -->
  <div class="box">
    <h2>Your Answer</h2>
    <textarea id="answer" placeholder="Type your answer here..."></textarea>

    <div class="buttons">
      <button onclick="submitAnswer()">Submit</button>
      <button onclick="endTest()">End Test</button>
    </div>
  </div>

</div>

<!-- 🔷 PROFILE POPUP -->
<div id="profile" class="popup">
  <h3>Profile</h3>
  <input type="text" placeholder="Name">
  <input type="text" placeholder="Email">
  <input type="text" placeholder="College">
</div>

<!-- 🔷 SCRIPT -->
<script>
let questions = [
  "Tell me about yourself",
  "What are your strengths?",
  "Explain OSI model",
  "What is HTML?"
];

let score = 0;
let total = 0;

function start(){
  nextQuestion();
}

function nextQuestion(){
  let q = questions[Math.floor(Math.random()*questions.length)];
  document.getElementById("question").innerText = q;
}

function submitAnswer(){
  let ans = document.getElementById("answer").value;

  if(ans.trim() === ""){
    alert("Please enter answer");
    return;
  }

  total++;

  if(ans.length > 20){
    score++;
    alert("Good Answer 👍");
  } else {
    alert("Improve your answer ⚠️");
  }

  document.getElementById("answer").value = "";
  nextQuestion();
}

function endTest(){
  alert("Final Score: " + score + "/" + total);
}

function toggleProfile(){
  let p = document.getElementById("profile");
  p.style.display = (p.style.display === "block") ? "none" : "block";
}

function showNotification(){
  alert("No new notifications 🔔");
}

function showScore(){
  alert("Score: " + score + "/" + total);
}

/* Start automatically */
start();
</script>

</body>
</html>
