<!DOCTYPE html>
<html>
<head>
  <title>AI INTERVIEW CHATBOT</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1e3a5f; /* uniform color */
      color: white;
      text-align: center;
    }

    .screen {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    h1 {
      font-weight: bold;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
    }

    .right {
      display: flex;
      gap: 15px;
    }

    .link-btn {
      cursor: pointer;
      font-weight: bold;
    }

    /* BUTTON STYLE */
    .btn {
      padding: 12px 25px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      background: white;
      color: #1e3a5f;
      font-weight: bold;
    }

    .btn:active {
      background: #0d2b45;
      color: white;
    }

    /* INPUT */
    input {
      width: 70%;
      padding: 15px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

  </style>
</head>

<body>

<!-- 🔷 SCREEN 1 -->
<div id="screen1" class="screen active">

  <div class="topbar">
    <div></div>
    <div class="right">
      <div class="link-btn">Login</div>
      <div class="link-btn">Sign Up</div>
    </div>
  </div>

  <h1>AI INTERVIEW CHATBOT</h1>

  <button class="btn" onclick="goToScreen2()">Start Mock Interview</button>
</div>

<!-- 🔷 SCREEN 2 -->
<div id="screen2" class="screen">

  <div class="topbar">
    <div onclick="goBack()" style="cursor:pointer;">⬅</div>
    <div class="right">
      <div class="link-btn">Login</div>
      <div class="link-btn">Sign Up</div>
    </div>
  </div>

  <h2><b>Select Domain & Level</b></h2>

  <h3><b>Choose Domain</b></h3>
  <button class="btn" onclick="selectDomain('HR')">HR</button>
  <button class="btn" onclick="selectDomain('Software')">Software</button>
  <button class="btn" onclick="selectDomain('Aptitude')">Aptitude</button>

  <h3><b>Select Level</b></h3>
  <button class="btn" onclick="selectLevel('Easy')">Easy</button>
  <button class="btn" onclick="selectLevel('Medium')">Intermediate</button>
  <button class="btn" onclick="selectLevel('Hard')">Advanced</button>

  <br>
  <button class="btn" onclick="startInterview()">Begin Interview</button>
</div>

<!-- 🔷 SCREEN 3 -->
<div id="screen3" class="screen">

  <div class="topbar">
    <div onclick="goBack2()" style="cursor:pointer;">⬅</div>
    <div class="right">
      <div class="link-btn">Login</div>
      <div class="link-btn">Sign Up</div>
    </div>
  </div>

  <h2><b>Interview</b></h2>

  <p id="question"><b>Question will appear here</b></p>

  <input type="text" id="answer" placeholder="Type your answer here...">

  <br><br>

  <button class="btn" onclick="submitAnswer()">Submit</button>
  <button class="btn" onclick="endTest()">End Test</button>

</div>

<script>
let domain = "";
let level = "";

let questions = {
  HR: ["Tell me about yourself", "Why should we hire you?"],
  Software: ["What is HTML?", "Explain OOP"],
  Aptitude: ["What is 20% of 200?", "Next number: 2,4,8,?"]
};

function goToScreen2(){
  document.getElementById("screen1").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

function goBack(){
  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen1").classList.add("active");
}

function goBack2(){
  document.getElementById("screen3").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

function selectDomain(d){
  domain = d;
  alert("Domain: " + d);
}

function selectLevel(l){
  level = l;
  alert("Level: " + l);
}

function startInterview(){
  if(domain === "" || level === ""){
    alert("Please select domain and level");
    return;
  }

  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen3").classList.add("active");
  nextQuestion();
}

function nextQuestion(){
  let q = questions[domain][Math.floor(Math.random()*questions[domain].length)];
  document.getElementById("question").innerHTML = "<b>" + q + "</b>";
}

function submitAnswer(){
  let ans = document.getElementById("answer").value;

  if(ans.trim() === ""){
    alert("Please enter answer");
    return;
  }

  if(ans.length > 10){
    alert("Good Answer 👍");
  } else {
    alert("Improve your answer ⚠️");
  }

  document.getElementById("answer").value = "";
  nextQuestion();
}

function endTest(){
  alert("Test Ended");
}
</script>

</body>
</html>
